<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>API-test, Heldenshop (intern)</title>
<style>
  body{margin:0;font-family:'Nunito',system-ui,Segoe UI,sans-serif;background:#FFFBF2;color:#232850;padding:24px;line-height:1.5}
  .wrap{max-width:880px;margin:0 auto}
  h1{font-family:'Fredoka',system-ui,sans-serif;margin:0 0 4px}
  p.lead{color:#5A6080;margin:0 0 20px}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  input{flex:1;min-width:240px;border:2px solid #E3D9BD;border-radius:12px;padding:12px 14px;font-size:1rem;font-family:inherit}
  button{border:none;cursor:pointer;background:#2B54E0;color:#fff;font-family:'Fredoka',system-ui,sans-serif;font-weight:600;font-size:1rem;padding:12px 22px;border-radius:999px;box-shadow:0 4px 0 #1E3CB0}
  button:active{transform:translateY(2px);box-shadow:0 2px 0 #1E3CB0}
  .status{padding:12px 16px;border-radius:12px;font-weight:700;margin-bottom:16px;display:none}
  .status.ok{display:block;background:#E1F7EF;color:#13794F;border:2px solid #B6EAD3}
  .status.err{display:block;background:#FDE7E7;color:#B3261E;border:2px solid #F6C9C9}
  .preview{display:none;gap:16px;background:#fff;border:2px solid #F1E8D2;border-radius:20px;padding:18px;margin-bottom:18px}
  .preview img{width:140px;height:140px;object-fit:contain;background:#F4F6FC;border-radius:12px;flex:0 0 auto}
  .preview h3{font-family:'Fredoka',system-ui,sans-serif;margin:0 0 6px}
  .muted{color:#8A8FB0;font-size:.85rem}
  pre{background:#10142B;color:#C7E0FF;padding:16px;border-radius:14px;overflow:auto;font-size:.8rem;max-height:50vh;white-space:pre-wrap;word-break:break-word}
  code{background:#EEF1F8;padding:2px 6px;border-radius:6px}
</style>
</head>
<body>
<div class="wrap">
  <h1>🔧 API-test (intern)</h1>
  <p class="lead">Privé-pagina om de bol-koppeling te controleren. <strong>Stap 1:</strong> zet <code>BOL_CLIENT_ID</code> + <code>BOL_CLIENT_SECRET</code> in Vercel en deploy. <strong>Stap 2:</strong> klik hieronder op Test. <strong>Stap 3:</strong> stuur Cars het resultaat.</p>

  <div class="row">
    <input id="pid" value="9300000166566955" aria-label="bol product-ID" placeholder="bol product-ID, bijv. 9300000166566955">
    <button id="go">Test API</button>
  </div>

  <div class="status" id="status"></div>

  <div class="preview" id="preview">
    <img id="pimg" alt="productfoto" src="">
    <div>
      <h3 id="ptitle"></h3>
      <div id="pprice" style="font-weight:800;color:#EE2A3C;font-size:1.1rem"></div>
      <div id="prating" class="muted"></div>
      <div id="pean" class="muted"></div>
      <a id="purl" href="#" target="_blank" rel="sponsored noopener" style="display:none;color:#2B54E0;font-weight:700">bol product-URL →</a>
    </div>
  </div>

  <p class="muted">Ruwe API-respons (stuur deze naar Cars):</p>
  <pre id="out">nog niets getest,</pre>
</div>

<script>
  var statusEl = document.getElementById('status');
  var out = document.getElementById('out');
  var preview = document.getElementById('preview');

  function setStatus(kind, msg){ statusEl.className = 'status ' + kind; statusEl.textContent = msg; }

  async function test(){
    var id = document.getElementById('pid').value.trim();
    if(!id){ setStatus('err','Vul een product-ID in.'); return; }
    setStatus('ok','Bezig met testen…');
    preview.style.display = 'none';
    out.textContent = '…';
    try {
      var r = await fetch('/api/products?ids=' + encodeURIComponent(id) + '&debug=1');
      var data = await r.json();
      out.textContent = JSON.stringify(data, null, 2);
      var p = data.products && data.products[0];
      if (data.error) {
        setStatus('err', 'Fout: ' + data.error);
        return;
      }
      if (p && !p.error && (p.title || p.image)) {
        setStatus('ok', '✅ Gelukt! De koppeling werkt.');
        document.getElementById('ptitle').textContent = p.title || '(geen titel)';
        document.getElementById('pprice').textContent = p.price != null ? ('€ ' + Number(p.price).toFixed(2).replace('.', ',')) : '(geen prijs)';
        document.getElementById('prating').textContent = p.rating != null ? ('★ ' + p.rating + (p.ratingCount ? ' · ' + p.ratingCount + ' reviews' : '')) : '(geen beoordeling)';
        document.getElementById('pean').textContent = 'EAN: ' + (p.ean || ', ');
        var img = document.getElementById('pimg');
        if (p.image) { img.src = p.image; img.style.display=''; } else { img.style.display='none'; }
        var url = document.getElementById('purl');
        if (p.url) { url.href = p.url; url.style.display='inline'; }
        preview.style.display = 'flex';
      } else {
        setStatus('err', 'Verbinding OK, maar geen productdata. Bekijk de ruwe respons hieronder.');
      }
    } catch (e) {
      setStatus('err', 'Kon /api/products niet bereiken: ' + e.message);
      out.textContent = String(e);
    }
  }
  document.getElementById('go').addEventListener('click', test);
</script>
</body>
</html>
