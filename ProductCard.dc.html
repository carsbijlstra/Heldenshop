<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<article style="position:relative;display:flex;flex-direction:column;height:100%;background:#ffffff;border:2px solid #F1E8D2;border-radius:30px;box-shadow:0 14px 30px rgba(35,40,80,.08);overflow:hidden;transition:transform .18s ease, box-shadow .18s ease" style-hover="transform:translateY(-8px) rotate(-.4deg);box-shadow:0 24px 46px rgba(35,40,80,.16)">
  <a href="{{ url }}" target="_blank" rel="sponsored noopener" aria-label="{{ ctaAria }}" style="display:block;position:relative;text-decoration:none">
    <sc-if value="{{ hasImg }}" hint-placeholder-val="">
      <img src="{{ img }}" alt="{{ alt }}" loading="lazy" style="display:block;width:100%;height:{{ imgPx }};object-fit:cover;object-position:center;background:#F4F6FB">
    </sc-if>
    <sc-if value="{{ noImg }}" hint-placeholder-val="{{ true }}">
      <div role="img" aria-label="{{ alt }}" style="height:{{ imgPx }};background-image:repeating-linear-gradient(135deg,#EEF3FC 0,#EEF3FC 11px,#E4ECF8 11px,#E4ECF8 22px);display:flex;align-items:flex-end;justify-content:center;padding:14px">
        <span style="font-family:'Nunito',ui-monospace,monospace;font-weight:700;font-size:.74rem;letter-spacing:.02em;color:#5C6488;background:rgba(255,255,255,.82);border:1.5px dashed #B9C4DB;border-radius:999px;padding:5px 12px">{{ imgLabel }}</span>
      </div>
    </sc-if>
    <sc-if value="{{ showRank }}" hint-placeholder-val="{{ true }}">
      <div style="position:absolute;top:14px;left:14px;width:46px;height:46px;border-radius:50%;background:{{ medalBg }};border:3px solid {{ medalRing }};display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.35rem;color:#2A2F55;box-shadow:0 4px 10px rgba(0,0,0,.16)">{{ rank }}</div>
    </sc-if>
  </a>
  <div style="padding:{{ pad }};display:flex;flex-direction:column;gap:10px;flex:1">
    <sc-if value="{{ badge }}" hint-placeholder-val="x">
      <span style="align-self:flex-start;background:{{ badgeBg }};color:{{ accent }};font-family:'Fredoka',sans-serif;font-weight:600;font-size:.8rem;padding:6px 13px;border-radius:999px">{{ badge }}</span>
    </sc-if>
    <h3 style="margin:0;font-family:'Fredoka',sans-serif;font-weight:600;font-size:{{ titleSize }};line-height:1.16;color:#232850;text-wrap:pretty">{{ title }}</h3>
    <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
      <span style="display:inline-flex;gap:1px" aria-hidden="true">
        <sc-for list="{{ stars }}" as="star" hint-placeholder-count="5"><svg width="17" height="17" viewBox="0 0 24 24"><polygon points="12,2 14.9,8.7 22,9.3 16.5,14 18.3,21.5 12,17.4 5.7,21.5 7.5,14 2,9.3 9.1,8.7" fill="{{ star.fill }}"></polygon></svg></sc-for>
      </span>
      <span style="font-family:'Nunito',sans-serif;font-weight:800;color:#232850;font-size:.95rem">{{ ratingText }}</span>
      <span style="font-family:'Nunito',sans-serif;color:#8A8FB0;font-size:.82rem">{{ reviewsText }}</span>
    </div>
    <div style="margin-top:auto;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
      <span style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.5rem;color:#EE2A3C">{{ priceLabel }}</span>
      <span style="font-family:'Nunito',sans-serif;color:#9A9FBC;font-size:.76rem">richtprijs · actueel bij bol</span>
    </div>
    <a href="{{ url }}" target="_blank" rel="sponsored noopener" style="margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 18px;border-radius:999px;background:#2B54E0;color:#ffffff;font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.02rem;text-decoration:none;box-shadow:0 5px 0 #1E3CB0;transition:transform .14s ease, box-shadow .14s ease" style-hover="transform:translateY(2px);box-shadow:0 3px 0 #1E3CB0" style-active="transform:translateY(4px);box-shadow:0 1px 0 #1E3CB0">Bekijk bij bol <span aria-hidden="true">↗</span></a>
  </div>
</article>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:420},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;LEGO Marvel Motorachtervolging 76275&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;priceLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;± €38&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;badge&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Beste cadeau&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;rating&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:4.8,&quot;min&quot;:0,&quot;max&quot;:5,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;},&quot;reviews&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;1.2k&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;url&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://www.bol.com/nl/&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;imgLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;LEGO 76275 — productfoto&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;alt&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;LEGO Marvel 76275 Spider-Man vs Doc Ock speelgoed&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;podium&quot;,&quot;compact&quot;],&quot;default&quot;:&quot;compact&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;rank&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:0,&quot;min&quot;:0,&quot;max&quot;:3,&quot;tsType&quot;:&quot;number&quot;},&quot;featured&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:[&quot;#2B54E0&quot;,&quot;#EE2A3C&quot;,&quot;#1FC3B1&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props || {};
    const rank = parseInt(p.rank, 10) || 0;
    const rating = p.rating != null ? parseFloat(p.rating) : 0;
    const filledTo = Math.round(rating);
    const stars = [1,2,3,4,5].map(i => ({ fill: i <= filledTo ? '#FFB400' : '#E3E7F1' }));
    const medalMap = {
      1: { bg: '#FFD23F', ring: '#E0A500' },
      2: { bg: '#D2DAEA', ring: '#9AA8C4' },
      3: { bg: '#EFAA68', ring: '#CC7E36' }
    };
    const medal = medalMap[rank] || null;
    const variant = p.variant || 'compact';
    const featured = p.featured === true || p.featured === 'true' || (variant === 'podium' && rank === 1);
    const accent = p.accent || '#2B54E0';
    const badgeBgMap = { '#2B54E0': '#E9EFFF', '#EE2A3C': '#FFE9EC', '#1FC3B1': '#E1F7F3' };
    const badgeBg = badgeBgMap[accent] || '#EEF2FF';
    const title = p.title || 'Productnaam';
    const reviews = p.reviews || '';
    const img = p.img || '';
    return {
      url: p.url || '#',
      img, hasImg: !!img, noImg: !img,
      title,
      priceLabel: p.priceLabel || '± €00',
      badge: p.badge || '',
      imgLabel: p.imgLabel || 'productfoto',
      alt: p.alt || 'Spider-Man speelgoed productfoto (placeholder)',
      rank,
      showRank: rank > 0,
      medalBg: medal ? medal.bg : '#ffffff',
      medalRing: medal ? medal.ring : '#cccccc',
      stars,
      ratingText: rating ? rating.toFixed(1).replace('.', ',') : '—',
      reviewsText: reviews ? '(' + reviews + ')' : '',
      accent,
      badgeBg,
      imgPx: featured ? '230px' : '150px',
      titleSize: featured ? 'clamp(1.15rem,2.4vw,1.4rem)' : '1.05rem',
      pad: featured ? '22px' : '16px',
      ctaAria: 'Bekijk ' + title + ' bij bol.com (opent in een nieuw tabblad)'
    };
  }
}
</script>
</body>
</html>
