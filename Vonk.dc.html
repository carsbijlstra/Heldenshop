<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:200,&quot;height&quot;:240},&quot;cape&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2B54E0&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;suit&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#EE2A3C&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;fists&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props || {};
    const pick = (v, d) => Array.isArray(v) ? (v[0] || d) : (v || d);
    const fists = p.fists === true || p.fists === 'true';
    return {
      cape: pick(p.cape, '#2B54E0'),
      suit: pick(p.suit, '#EE2A3C'),
      fistR: fists ? 20 : 13
    };
  }
}
</script>
