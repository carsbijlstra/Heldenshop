<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="description" content="Heldenshop gidsen: uitleg, koopgidsen en cadeautips over Spider-Man speelgoed, samengesteld door echte fans.">
<meta name="robots" content="index,follow,max-image-preview:large">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:#FFFBF2}
@keyframes hs-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@media (prefers-reduced-motion: reduce){*{animation:none!important;scroll-behavior:auto!important;transition-duration:.01ms!important}}
</style>
</helmet>
<div style="font-family:'Nunito',system-ui,sans-serif;color:#232850;background:#FFFBF2;overflow-x:hidden">
  <dc-import name="SiteHeader" active-slug="spider-man-speelgoed" hint-size="100%,150px"></dc-import>
  <main>
    <nav aria-label="Kruimelpad" style="max-width:820px;margin:0 auto;padding:18px clamp(16px,4vw,32px) 0">
      <ol style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;list-style:none;margin:0;padding:0;font-weight:700;font-size:.86rem;color:#8A8FB0">
        <li><a href="Heldenshop Homepage.dc.html" style="color:#2B54E0;text-decoration:none">Home</a></li>
        <li aria-hidden="true">›</li>
        <li><a href="Gidsen.dc.html" style="color:#2B54E0;text-decoration:none">Gidsen</a></li>
        <li aria-hidden="true">›</li>
        <li aria-current="page" style="color:#232850">{{ crumbName }}</li>
      </ol>
    </nav>

    <article style="max-width:820px;margin:0 auto;padding:clamp(18px,3vw,30px) clamp(16px,4vw,32px) 0">
      <header style="margin-bottom:clamp(20px,3vw,30px)">
        <span style="display:inline-flex;align-items:center;gap:8px;background:#EEF2FF;color:#2B54E0;font-family:'Fredoka',sans-serif;font-weight:600;font-size:.78rem;padding:6px 13px;border-radius:999px">{{ tag }} · {{ readMin }} min lezen</span>
        <h1 style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(1.9rem,4.6vw,3rem);line-height:1.05;letter-spacing:-.02em;color:#232850;margin:14px 0 12px;text-wrap:pretty">{{ title }}</h1>
        <p style="font-size:clamp(1.05rem,1.8vw,1.25rem);line-height:1.5;color:#4C5276;font-weight:600;margin:0">{{ lead }}</p>
      </header>
      <div role="img" aria-label="{{ heroAlt }}" style="height:clamp(200px,32vw,320px);border-radius:26px;background-image:repeating-linear-gradient(135deg,#EEF3FC 0,#EEF3FC 13px,#E4ECF8 13px,#E4ECF8 26px);border:2px solid #fff;box-shadow:0 16px 36px rgba(35,40,80,.1);display:flex;align-items:center;justify-content:center;margin-bottom:clamp(24px,4vw,40px)">
        <span style="font-family:'Nunito',ui-monospace,monospace;font-weight:700;font-size:.8rem;color:#5C6488;background:rgba(255,255,255,.9);border:1.5px dashed #B9C4DB;border-radius:14px;padding:9px 14px">{{ heroLabel }}</span>
      </div>

      <div style="font-size:clamp(1.02rem,1.6vw,1.12rem);line-height:1.75;color:#3A4068;font-weight:500">
        <sc-for list="{{ sections }}" as="sec" hint-placeholder-count="4">
          <h2 style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(1.3rem,2.6vw,1.7rem);color:#232850;margin:clamp(26px,4vw,38px) 0 12px;line-height:1.15">{{ sec.h }}</h2>
          <sc-for list="{{ sec.paras }}" as="para" hint-placeholder-count="2">
            <p style="margin:0 0 14px">{{ para }}</p>
          </sc-for>
          <sc-if value="{{ sec.hasList }}" hint-placeholder-val="">
            <ul style="margin:4px 0 14px;padding-left:22px;display:flex;flex-direction:column;gap:8px">
              <sc-for list="{{ sec.list }}" as="li" hint-placeholder-count="3"><li style="line-height:1.5">{{ li }}</li></sc-for>
            </ul>
          </sc-if>
        </sc-for>
      </div>
    </article>

    <div style="max-width:1180px;margin:clamp(30px,4vw,48px) auto 0">
      <dc-import name="SpiderCrossSell" hint-size="100%,560px"></dc-import>
    </div>

    <section aria-labelledby="g-related" style="padding:clamp(36px,5vw,60px) clamp(16px,4vw,32px)">
      <div style="max-width:1180px;margin:0 auto">
        <h2 id="g-related" style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(1.3rem,2.6vw,1.8rem);color:#232850;margin:0 0 16px">Lees ook</h2>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:clamp(12px,1.8vw,18px)">
          <sc-for list="{{ related }}" as="r" hint-placeholder-count="3">
            <a href="{{ r.href }}" style="text-decoration:none;background:#fff;border:2px solid #F1E8D2;border-radius:22px;padding:20px;box-shadow:0 10px 22px rgba(35,40,80,.06);transition:transform .16s ease" style-hover="transform:translateY(-5px)">
              <span style="font-family:'Fredoka',sans-serif;font-weight:600;font-size:.72rem;color:#2B54E0;text-transform:uppercase;letter-spacing:.04em">{{ r.tag }}</span>
              <div style="font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.08rem;color:#232850;margin-top:5px;line-height:1.2">{{ r.title }} →</div>
            </a>
          </sc-for>
        </div>
      </div>
    </section>
  </main>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    const a = this.getArticle();
    import('./seo.js').then(({ applySeo, breadcrumb, article }) => {
      applySeo({
        title: a.seoTitle, description: a.seoDesc, keywords: a.keywords,
        canonical: 'https://heldenshop.nl/gidsen/' + a.slug, ogType: 'article',
        jsonLd: [
          breadcrumb([{ name: 'Home', slug: '' }, { name: 'Gidsen', slug: 'gidsen' }, { name: a.title, slug: 'gidsen/' + a.slug }]),
          article({ headline: a.title, description: a.seoDesc, canonical: 'https://heldenshop.nl/gidsen/' + a.slug })
        ]
      });
    }).catch(() => {});
  }

  getArticle() {
    if (this._a) return this._a;
    let slug = 'wie-is-spider-man';
    try { slug = new URLSearchParams(location.search).get('slug') || slug; } catch (e) {}
    const all = this.articles();
    const a = all[slug] || all['wie-is-spider-man'];
    const order = ['wie-is-spider-man', 'brand-new-day-release-cast', 'top-10-spider-man-cadeaus', 'spider-man-speelgoed-per-leeftijd', 'leukste-spider-man-lego-sets', 'spider-man-verkleedpak-kopen'];
    a.related = order.filter((s) => s !== a.slug).slice(0, 3).map((s) => ({ href: 'Gids.dc.html?slug=' + s, tag: all[s].tag, title: all[s].title }));
    this._a = a;
    return a;
  }

  articles() {
    const mk = (sections) => sections.map((s) => ({ h: s.h, paras: s.paras, hasList: !!(s.list && s.list.length), list: s.list || [] }));
    return {
      'wie-is-spider-man': {
        slug: 'wie-is-spider-man', tag: 'Uitleg', readMin: 4,
        title: 'Wie is Spider-Man?', heroLabel: '[ artikelbeeld ] Spider-Man', heroAlt: 'Illustratie bij de gids Wie is Spider-Man',
        lead: 'Maak kennis met de vriendelijke held uit de buurt — en ontdek waarom kinderen wereldwijd dol op hem zijn.',
        sections: mk([
          { h: 'Wie is Spider-Man eigenlijk?', paras: ['Spider-Man is een van de bekendste superhelden ter wereld. Achter het masker zit Peter Parker, een gewone tiener die na een beet van een bijzondere spin plotseling spinnenkrachten krijgt.', 'Hij kan langs muren klimmen, is supersterk en snel, en schiet webben om door de stad te slingeren. Zijn beroemde motto: met grote kracht komt grote verantwoordelijkheid.'] },
          { h: 'Waarom vinden kinderen hem zo leuk?', paras: ['Spider-Man is grappig, behulpzaam en herkenbaar. Hij is geen onaantastbare superheld, maar iemand die ook fouten maakt en blijft doorzetten.', 'Daardoor is hij dé held om mee te spelen, je voor te verkleden en cadeau te geven.'], list: ['Vrolijk en grappig karakter', 'Coole webslinger-bewegingen', 'Held uit de buurt: dichtbij en herkenbaar'] },
          { h: 'Welk Spider-Man speelgoed is er?', paras: ['Er is enorm veel keuze: van grote actiefiguren en LEGO bouwsets tot web-blasters, verkleedpakken, knuffels en verzamelfiguren. Voor elke leeftijd is er wel iets leuks.', 'Bekijk onze door fans gekozen toppers op de pagina Spider-Man speelgoed, of laat je inspireren door onze cadeautips.'] }
        ]),
        seoTitle: 'Wie is Spider-Man? Uitleg voor kinderen & ouders | Heldenshop',
        seoDesc: 'Wie is Spider-Man? Een simpele uitleg over Peter Parker, zijn krachten en waarom kinderen dol op hem zijn — plus het leukste Spider-Man speelgoed.',
        keywords: 'wie is spider-man, spider-man uitleg, peter parker, spider-man voor kinderen'
      },
      'brand-new-day-release-cast': {
        slug: 'brand-new-day-release-cast', tag: 'Film', readMin: 3,
        title: 'Spider-Man: Brand New Day — release & cast', heroLabel: '[ artikelbeeld ] Brand New Day', heroAlt: 'Illustratie bij de gids over Spider-Man Brand New Day',
        lead: 'Alles wat we nu weten over de nieuwe Spider-Man film, die vanaf 31 juli 2026 in de bioscoop draait.',
        sections: mk([
          { h: 'Wanneer komt de film uit?', paras: ['Spider-Man: Brand New Day verschijnt vanaf 31 juli 2026 in de Nederlandse bioscopen. Op onze speciale pagina vind je een handige aftelteller tot de release.'] },
          { h: 'Wat is er nieuw?', paras: ['De titel belooft een frisse start voor Spider-Man, met onder meer een nieuw pak. Rond elke nieuwe film verschijnt traditioneel veel nieuw speelgoed: figuren in het nieuwe pak, LEGO sets, web-blasters en verkleedkleding.'] },
          { h: 'En de cast?', paras: ['Officiële castdetails worden door de filmstudio bekendgemaakt en kunnen nog veranderen. Wij houden deze gids bij zodra er meer bekend is, zodat je niets mist. Volg ons of schrijf je in voor de ouder-update.'] }
        ]),
        seoTitle: 'Spider-Man: Brand New Day — release, cast & merch (2026) | Heldenshop',
        seoDesc: 'Wanneer komt Spider-Man: Brand New Day uit? Release 31 juli 2026, wat er nieuw is en welk speelgoed eromheen verschijnt. Bijgewerkt door fans.',
        keywords: 'spider-man brand new day release, brand new day cast, spider-man film 2026, spider-man nieuwe film'
      },
      'top-10-spider-man-cadeaus': {
        slug: 'top-10-spider-man-cadeaus', tag: 'Cadeautips', readMin: 5,
        title: 'Top 10 Spider-Man cadeaus', heroLabel: '[ artikelbeeld ] cadeaus', heroAlt: 'Illustratie bij de gids met top 10 Spider-Man cadeaus',
        lead: 'Op zoek naar een cadeau voor een Spider-Man fan? Dit zijn onze 10 favorieten voor elk budget.',
        sections: mk([
          { h: 'Onze 10 favoriete Spider-Man cadeaus', paras: ['Van groot tot klein en voor elke leeftijd — deze cadeaus scoren altijd. Bekijk de actuele prijzen via de knoppen onderaan, bij onze uitgelichte toppers.'], list: ['LEGO Marvel Motorachtervolging (76275) — beste cadeau', 'Titan Hero Spider-Man 30 cm — grootste favoriet', 'Real Webs Ultimate Web-blaster — meeste actie', 'Funko Pop! Spider-Man — voor verzamelaars', 'Spidey knuffel met glow-in-the-dark ogen — voor de jongsten', 'Smoby Spider-Man step — lekker naar buiten', 'Spider-Man verkleedpak — word zelf een held', 'Spider-Man masker — snel en betaalbaar', 'Ravensburger Spider-Man puzzel — rustig samen spelen', 'Spider-Man feestset — voor het verjaardagsfeestje'] },
          { h: 'Hoe kies je het juiste cadeau?', paras: ['Let op de leeftijd en op wat het kind leuk vindt: bouwen, spelen, verzamelen of verkleden. In onze koopgids per leeftijd helpen we je verder.'] }
        ]),
        seoTitle: 'Top 10 Spider-Man cadeaus (2026) — voor elk budget | Heldenshop',
        seoDesc: 'De 10 leukste Spider-Man cadeaus voor kinderen, door fans gekozen. Van LEGO en actiefiguren tot knuffels en verkleedpakken — voor elk budget en elke leeftijd.',
        keywords: 'spider-man cadeau, spider-man cadeaus, spider-man kado, spider-man speelgoed cadeau, cadeau spider-man fan'
      },
      'spider-man-speelgoed-per-leeftijd': {
        slug: 'spider-man-speelgoed-per-leeftijd', tag: 'Koopgids', readMin: 5,
        title: 'Welk Spider-Man speelgoed past bij welke leeftijd?', heroLabel: '[ artikelbeeld ] per leeftijd', heroAlt: 'Illustratie bij de koopgids Spider-Man speelgoed per leeftijd',
        lead: 'Van peuter tot verzamelaar: zo kies je Spider-Man speelgoed dat echt past bij de leeftijd.',
        sections: mk([
          { h: '0-4 jaar: zacht en simpel', paras: ['Voor de allerjongsten zijn knuffels, eenvoudige puzzels en grote, stevige figuren ideaal. Kies speelgoed zonder kleine onderdelen.'] },
          { h: '5-8 jaar: actie en rollenspel', paras: ['Nu komen web-blasters, verkleedpakken en actiefiguren tot leven. Kinderen spelen graag de avonturen na.'] },
          { h: '9-12 jaar: bouwen en verzamelen', paras: ['LEGO sets en gedetailleerde figuren zijn favoriet. Ze dagen uit en zien er prachtig uit op de plank.'] },
          { h: '13+ en verzamelaars', paras: ['Funko Pop figuren en grotere LEGO sets zijn perfect voor tieners en fans die willen verzamelen. Bekijk per leeftijd onze toppers op de Spider-Man speelgoed pagina.'] }
        ]),
        seoTitle: 'Spider-Man speelgoed per leeftijd — complete koopgids | Heldenshop',
        seoDesc: 'Welk Spider-Man speelgoed past bij welke leeftijd? Onze koopgids helpt ouders kiezen, van peuter (0-2) tot verzamelaar (13+).',
        keywords: 'spider-man speelgoed leeftijd, spider-man cadeau leeftijd, speelgoed per leeftijd, spider-man koopgids'
      },
      'leukste-spider-man-lego-sets': {
        slug: 'leukste-spider-man-lego-sets', tag: 'LEGO', readMin: 4,
        title: 'De leukste Spider-Man LEGO sets', heroLabel: '[ artikelbeeld ] LEGO', heroAlt: 'Illustratie bij de gids over de leukste Spider-Man LEGO sets',
        lead: 'Bouwen én spelen: dit zijn de Spider-Man LEGO sets die er bij fans uitspringen.',
        sections: mk([
          { h: 'Waarom LEGO Marvel zo leuk is', paras: ['LEGO Marvel sets combineren bouwplezier met naspelen. Je bouwt voertuigen, gebouwen en scènes, met minifiguren van Spider-Man en zijn tegenstanders.'] },
          { h: 'Onze favoriete set', paras: ['De LEGO Marvel Motorachtervolging: Spider-Man vs. Doc Ock (76275) is een echte topper en een fijn cadeau rond de 38 euro. Bekijk de actuele prijs via onze knop onderaan.'] },
          { h: 'Waar let je op?', paras: ['Kijk naar de aanbevolen leeftijd op de doos en het aantal onderdelen. Voor jongere kinderen zijn kleinere sets met grotere stukken handiger.'], list: ['Let op de aanbevolen leeftijd', 'Meer onderdelen = uitdagender', 'Combineer sets voor meer speelplezier'] }
        ]),
        seoTitle: 'De leukste Spider-Man LEGO sets (2026) | Heldenshop',
        seoDesc: 'Welke Spider-Man LEGO set kopen? Onze fans tippen de leukste LEGO Marvel sets, met de 76275 motorachtervolging als topper. Prijzen vergeleken.',
        keywords: 'spider-man lego, lego marvel spider-man, lego 76275, spider-man lego set, lego spider-man kopen'
      },
      'spider-man-verkleedpak-kopen': {
        slug: 'spider-man-verkleedpak-kopen', tag: 'Koopgids', readMin: 4,
        title: 'Spider-Man verkleedpak kopen: waar op letten?', heroLabel: '[ artikelbeeld ] verkleedpak', heroAlt: 'Illustratie bij de koopgids Spider-Man verkleedpak kopen',
        lead: 'Word zelf de webslinger! Zo kies je een Spider-Man verkleedpak dat lekker zit en lang meegaat.',
        sections: mk([
          { h: 'Let op de maat', paras: ['Verkleedpakken vallen soms klein uit. Kijk goed naar de maattabel en kies bij twijfel een maatje groter, zodat er ruimte is om te bewegen en te groeien.'] },
          { h: 'Let op de kwaliteit', paras: ['Een goed pak is van stevig, zacht materiaal met nette naden. Een masker dat goed zicht geeft is fijn voor jonge kinderen.'], list: ['Controleer de maattabel', 'Zacht en stevig materiaal', 'Goed zicht door het masker', 'Makkelijk aan en uit te trekken'] },
          { h: 'Compleet maken', paras: ['Combineer het pak met een masker en eventueel een web-blaster voor extra speelplezier. Bekijk onze Spider-Man verkleedpak categorie voor de fijnste keuzes.'] }
        ]),
        seoTitle: 'Spider-Man verkleedpak kopen — maat & tips (2026) | Heldenshop',
        seoDesc: 'Een Spider-Man verkleedpak kopen? Let op maat, kwaliteit en zicht door het masker. Onze koopgids helpt je het beste kostuum te kiezen.',
        keywords: 'spider-man verkleedpak, spider-man kostuum kind, spider-man pak kopen, spider-man verkleedkleding'
      }
    };
  }

  renderVals() {
    const a = this.getArticle();
    return { crumbName: a.title, title: a.title, tag: a.tag, readMin: a.readMin, lead: a.lead, heroLabel: a.heroLabel, heroAlt: a.heroAlt, sections: a.sections, related: a.related };
  }
}
</script>
</body>
</html>
