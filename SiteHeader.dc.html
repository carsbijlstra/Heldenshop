<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,700&display=swap" rel="stylesheet">
</helmet>
<div style="font-family:'Nunito',system-ui,sans-serif">
  <header style="position:sticky;top:0;z-index:60;background:rgba(255,251,242,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 3px 0 rgba(35,40,80,.05)">
    <div style="max-width:1180px;margin:0 auto;padding:14px clamp(16px,4vw,32px);display:flex;align-items:center;gap:18px;flex-wrap:wrap">
      <a href="Heldenshop Homepage.dc.html" aria-label="Heldenshop home" style="display:flex;align-items:center;text-decoration:none;flex:0 0 auto">
        <span style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.6rem;letter-spacing:-.01em"><span style="color:#232850">Helden</span><span style="color:#EE2A3C">shop</span></span>
      </a>
      <form onSubmit="{{ onSearch }}" role="search" style="flex:1 1 320px;min-width:0;display:flex;align-items:center;gap:8px;background:#fff;border:2px solid #EFE6CE;border-radius:999px;padding:7px 8px 7px 18px;box-shadow:inset 0 2px 5px rgba(35,40,80,.04)">
        <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" style="flex:0 0 auto"><circle cx="11" cy="11" r="7" stroke="#9AA0C0" stroke-width="2.4"></circle><path d="M16.5 16.5 L21 21" stroke="#9AA0C0" stroke-width="2.4" stroke-linecap="round"></path></svg>
        <input type="search" placeholder="Zoek je favoriete held..." aria-label="Zoek je favoriete held" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:600;color:#232850">
        <button type="submit" style="flex:0 0 auto;border:none;cursor:pointer;background:#2B54E0;color:#fff;font-family:'Fredoka',sans-serif;font-weight:600;font-size:.95rem;padding:10px 20px;border-radius:999px;box-shadow:0 4px 0 #1E3CB0" style-hover="filter:brightness(1.05)">Zoek</button>
      </form>
    </div>
    <nav aria-label="Thema's" style="border-top:1px solid rgba(35,40,80,.06)">
      <div style="max-width:1180px;margin:0 auto;padding:11px clamp(16px,4vw,32px);display:flex;align-items:center;gap:10px;overflow-x:auto;scrollbar-width:thin">
        <sc-for list="{{ themes }}" as="theme" hint-placeholder-count="11">
          <a href="{{ theme.href }}" aria-current="{{ theme.current }}" style="flex:0 0 auto;position:relative;display:inline-flex;align-items:center;gap:7px;text-decoration:none;font-family:'Fredoka',sans-serif;font-weight:600;font-size:.95rem;padding:9px 16px;border-radius:999px;background:{{ theme.soft }};color:{{ theme.ink }};border:2px solid {{ theme.border }};box-shadow:{{ theme.shadow }};transition:transform .14s ease" style-hover="transform:translateY(-2px)">{{ theme.name }}<sc-if value="{{ theme.badge }}" hint-placeholder-val="x"><span style="background:#FFD23F;color:#7A5A00;font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.03em;padding:3px 7px;border-radius:999px">{{ theme.badge }}</span></sc-if></a>
        </sc-for>
        <a href="Speelgoed.dc.html?p=alle-helden" style="flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-family:'Fredoka',sans-serif;font-weight:600;font-size:.95rem;padding:9px 16px;border-radius:999px;background:#232850;color:#fff;border:2px solid #232850;white-space:nowrap" style-hover="filter:brightness(1.15)">Alle helden →</a>
      </div>
    </nav>
  </header>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:150},&quot;activeSlug&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.activeSlug || '';
    const base = [
      { name: 'Spider-Man', slug: 'spider-man-speelgoed', soft: '#EE2A3C', ink: '#ffffff', border: '#C81E2E', badge: 'nu populair' },
      { name: 'Batman', slug: 'batman-speelgoed', soft: '#ECEFF7', ink: '#2A2F55', border: '#D6DCEC' },
      { name: 'Avengers', slug: 'avengers-speelgoed', soft: '#FDEAEA', ink: '#C2283A', border: '#F7CFCF' },
      { name: 'Hulk', slug: 'hulk-speelgoed', soft: '#E3F6E6', ink: '#1E7A33', border: '#BCE7C4' },
      { name: 'Pokémon', slug: 'pokemon-speelgoed', soft: '#FFF4D6', ink: '#9A7400', border: '#FBE39C' },
      { name: 'Super Mario', slug: 'super-mario-speelgoed', soft: '#FDE7E7', ink: '#C2283A', border: '#F6C9C9' },
      { name: 'Star Wars', slug: 'star-wars-speelgoed', soft: '#ECEEF4', ink: '#2A2F55', border: '#D8DDEB' },
      { name: 'Frozen', slug: 'frozen-speelgoed', soft: '#E6F4FB', ink: '#1E72A8', border: '#C4E6F4' },
      { name: 'Paw Patrol', slug: 'paw-patrol-speelgoed', soft: '#FFF1DC', ink: '#B5701A', border: '#FBDFB4' },
      { name: 'Harry Potter', slug: 'harry-potter-speelgoed', soft: '#EFE9DD', ink: '#6E5A2E', border: '#DECFB0' },
      { name: 'LEGO', slug: 'lego-speelgoed', soft: '#FFEFD0', ink: '#B26B00', border: '#FBDD9E' }
    ];
    const themes = base.map((t) => {
      const isActive = t.slug === active;
      return Object.assign({}, t, {
        href: 'Speelgoed.dc.html?p=' + t.slug,
        current: isActive ? 'page' : undefined,
        shadow: isActive ? '0 0 0 3px #FFD23F' : 'none'
      });
    });
    const onSearch = (e) => { e.preventDefault(); };
    return { themes, onSearch };
  }
}
</script>
</body>
</html>
